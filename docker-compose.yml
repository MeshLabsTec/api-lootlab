version: '3.9'

services:
  app:
    image: node:latest
    tty: true
    stdin_open: true
    container_name: api-lootlab
    restart: always
    working_dir: /src
    depends_on:
      - api-lootlab-postgresql
    ports:
      - 3333:3333
    env_file:
      - .env
    
  api-lootlab-postgresql:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    env_file:
      - .env
    volumes:
      - postgres-volume:var/lib/postgresql/data
